# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v12 : FIX mmg3d (ExternalProject) + emitterutils.cpp (chemin exact)
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d
            mingw-w64-x86_64-mmg

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          P='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$P" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # FIX v12a : patch emitterutils.cpp — chemin exact connu
      # Ajoute #include <cstdint> après la ligne 12 (#include null.h)
      # -----------------------------------------------------------------
      - name: Patch emitterutils.cpp
        run: |
          FILE="ASLI/libs/yaml/src/emitterutils.cpp"
          if [ -f "$FILE" ] && ! grep -q "cstdint" "$FILE"; then
            sed -i '/#include "yaml-cpp\/null.h"/a #include <cstdint>' "$FILE"
            echo "Added cstdint to $FILE"
          else
            echo "Already patched or not found: $FILE"
          fi

      # -----------------------------------------------------------------
      # FIX v12b : mmg3d est un ExternalProject — il est téléchargé dans
      # libs/mmg et son CMakeLists.txt est trop vieux.
      # Solution : utiliser mmg installé via pacman (mingw-w64-x86_64-mmg)
      # et dire à ASLI de ne pas recompiler mmg en interne
      # -----------------------------------------------------------------
      - name: Patch ASLI CMakeLists to use system mmg
        run: |
          FILE="ASLI/CMakeLists.txt"
          if [ -f "$FILE" ]; then
            # Cherche et affiche les lignes mmg pour diagnostic
            echo "=== MMG references in CMakeLists.txt ==="
            grep -n -i "mmg" "$FILE" | head -30
          fi
          # Patch le CMakeLists de mmg dans libs si présent
          find ASLI/libs/mmg -name "CMakeLists.txt" 2>/dev/null | while read F; do
            if grep -q "cmake_minimum_required" "$F"; then
              sed -i 's/cmake_minimum_required(VERSION [0-9]\.[0-9]*)/cmake_minimum_required(VERSION 3.5)/gI' "$F"
              echo "Patched version in $F"
            fi
          done

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
