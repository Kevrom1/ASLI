# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v15 : FIX mmg3d — corrige la syntaxe CMAKE_ARGS(...) → CMAKE_ARGS ...
#       et injecte CMAKE_POLICY_VERSION_MINIMUM=3.5
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d
            mingw-w64-x86_64-python

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          P='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$P" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # Patch emitterutils.cpp
      # -----------------------------------------------------------------
      - name: Patch emitterutils.cpp
        run: |
          FILE="ASLI/libs/yaml/src/emitterutils.cpp"
          if [ -f "$FILE" ] && ! grep -q "cstdint" "$FILE"; then
            sed -i 's|#include "yaml-cpp/null.h"|#include "yaml-cpp/null.h"\n#include <cstdint>|' "$FILE"
            echo "Patched: $FILE"
          fi

      # -----------------------------------------------------------------
      # FIX v15 : corrige le CMakeLists.txt d'ASLI via Python
      # Problème : CMAKE_ARGS(-D... -D...) → les parenthèses sont parsées
      #            comme des chemins séparés par CMake moderne
      # Fix : CMAKE_ARGS(-D...) → CMAKE_ARGS -D... (sans parenthèses)
      #       + injection de -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      # -----------------------------------------------------------------
      - name: Fix mmg3d CMAKE_ARGS syntax via Python
        run: |
          python3 - << 'PYEOF'
          import re

          filepath = "ASLI/CMakeLists.txt"
          with open(filepath, "r") as f:
              content = f.read()

          print("=== Original mmg3d block ===")
          lines = content.split('\n')
          in_mmg = False
          for i, line in enumerate(lines):
              if 'ExternalProject_Add' in line and 'MMG' in line:
                  in_mmg = True
              if in_mmg:
                  print(f"  {i+1}: {line}")
              if in_mmg and line.strip() == ')':
                  in_mmg = False
                  break

          # Fix 1: CMAKE_ARGS(-D...) → CMAKE_ARGS\n        -D...
          # Remplace CMAKE_ARGS( par CMAKE_ARGS\n        
          # et supprime la ) fermante correspondante
          content_new = re.sub(
              r'CMAKE_ARGS\((-[^)]+)\)',
              lambda m: 'CMAKE_ARGS\n        ' + m.group(1).replace(' -D', '\n        -D'),
              content
          )

          # Fix 2: injecte POLICY_VERSION_MINIMUM dans le bloc mmg3d
          content_new = content_new.replace(
              'CMAKE_ARGS\n        -DCMAKE_BUILD_TYPE=Release -DBUILD_MMG3D',
              'CMAKE_ARGS\n        -DCMAKE_BUILD_TYPE=Release\n        -DCMAKE_POLICY_VERSION_MINIMUM=3.5\n        -DBUILD_MMG3D'
          )

          # Fix alternatif si le premier ne matche pas
          if 'POLICY_VERSION_MINIMUM' not in content_new:
              content_new = content_new.replace(
                  '-DCMAKE_BUILD_TYPE=Release -DBUILD_MMG3D',
                  '-DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_MMG3D'
              )

          with open(filepath, "w") as f:
              f.write(content_new)

          # Vérifie
          if 'POLICY_VERSION_MINIMUM' in content_new:
              print("SUCCESS: CMAKE_POLICY_VERSION_MINIMUM injected")
          else:
              print("WARNING: injection may have failed, dumping cmake_args lines:")
              for i, line in enumerate(content_new.split('\n')):
                  if 'CMAKE_ARGS' in line or 'mmg3d' in line.lower() or 'POLICY' in line:
                      print(f"  {i+1}: {line}")
          PYEOF

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
