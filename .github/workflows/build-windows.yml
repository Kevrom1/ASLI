# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v4 : FIX via patch direct du fichier mshmet.c d'AdaptTools
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d

      # -----------------------------------------------------------------
      # FIX v4 : on ajoute le pragma directement dans mshmet.c et libmesh5.c
      # pour désactiver les warnings traités comme erreurs dans ce vieux code C
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          MSHMET="ASLI/libs/AdaptTools/sources/mshmet/mshmet.c"
          LIBMESH="ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"

          # Ajoute les pragmas en tête de chaque fichier s'ils n'y sont pas déjà
          for FILE in "$MSHMET" "$LIBMESH"; do
            if [ -f "$FILE" ]; then
              # Vérifie si le patch n'est pas déjà appliqué
              if ! grep -q "Wno-implicit-function-declaration" "$FILE"; then
                # Prépend les pragmas au fichier
                TMPFILE=$(mktemp)
                cat > "$TMPFILE" << 'EOF'
/* --- Compatibility patch for modern GCC --- */
#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"
#pragma GCC diagnostic ignored "-Wint-conversion"
#pragma GCC diagnostic ignored "-Wstringop-overflow"
/* ----------------------------------------- */
EOF
                cat "$FILE" >> "$TMPFILE"
                mv "$TMPFILE" "$FILE"
                echo "Patched: $FILE"
              else
                echo "Already patched: $FILE"
              fi
            else
              echo "File not found (skipping): $FILE"
            fi
          done

      - name: Configure ASLI
        run: |
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                ..

      - name: Build ASLI
        run: |
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: |
          ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: |
          cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: |
          ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI

          cp ASLI/bin/ASLI.exe          package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe      package/ASLI_QASLI/
          cp ASLI/config.yml            package/ASLI_QASLI/
          cp -r ASLI/inputs             package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          cp "$QT_BIN/Qt5Core.dll"          package/ASLI_QASLI/
          cp "$QT_BIN/Qt5Gui.dll"           package/ASLI_QASLI/
          cp "$QT_BIN/Qt5Widgets.dll"       package/ASLI_QASLI/
          cp "$QT_BIN/Qt53DCore.dll"        package/ASLI_QASLI/ 2>/dev/null || true
          cp "$QT_BIN/Qt53DRender.dll"      package/ASLI_QASLI/ 2>/dev/null || true
          cp "$QT_BIN/Qt53DExtras.dll"      package/ASLI_QASLI/ 2>/dev/null || true
          cp "$QT_BIN/libgcc_s_seh-1.dll"   package/ASLI_QASLI/ 2>/dev/null || true
          cp "$QT_BIN/libstdc++-6.dll"      package/ASLI_QASLI/ 2>/dev/null || true
          cp "$QT_BIN/libwinpthread-1.dll"  package/ASLI_QASLI/ 2>/dev/null || true

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
