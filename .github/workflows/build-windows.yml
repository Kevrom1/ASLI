# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v8 : FIX yaml-cpp — remplace la version interne cassée par la version système
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d
            mingw-w64-x86_64-yaml-cpp

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          PRAGMA_C='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in \
            "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" \
            "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$PRAGMA_C" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # FIX v8 : supprime le yaml-cpp interne d'ASLI et le remplace
      # par un stub CMake qui pointe vers la version système (pacman)
      # Le yaml-cpp système est à jour et compile sans erreur
      # -----------------------------------------------------------------
      - name: Replace internal yaml-cpp with system version
        run: |
          YAML_DIR="ASLI/libs/yaml"

          # Trouve le dossier yaml-cpp interne (yaml ou yaml-cpp)
          for DIR in "ASLI/libs/yaml" "ASLI/libs/yaml-cpp"; do
            if [ -d "$DIR" ]; then
              YAML_DIR="$DIR"
              echo "Found yaml-cpp at: $DIR"
              break
            fi
          done

          if [ -d "$YAML_DIR" ]; then
            # Sauvegarde le CMakeLists.txt original
            cp "$YAML_DIR/CMakeLists.txt" "$YAML_DIR/CMakeLists.txt.bak" 2>/dev/null || true

            # Remplace par un stub qui utilise find_package (version système)
            cat > "$YAML_DIR/CMakeLists.txt" << 'STUBEOF'
# Stub: redirect to system yaml-cpp installed via pacman
cmake_minimum_required(VERSION 3.10)
project(yaml-cpp-stub)
find_package(yaml-cpp REQUIRED)
if(NOT TARGET yaml-cpp)
  add_library(yaml-cpp INTERFACE)
  target_link_libraries(yaml-cpp INTERFACE yaml-cpp::yaml-cpp)
endif()
STUBEOF
            echo "Replaced yaml-cpp CMakeLists.txt with system stub"
          else
            echo "yaml-cpp directory not found — skipping replacement"
          fi

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
