# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v17 : FIX mmg3d — remplacement EXACT de CMAKE_ARGS(...) connus
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d
            mingw-w64-x86_64-python

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          P='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$P" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # Patch emitterutils.cpp
      # -----------------------------------------------------------------
      - name: Patch emitterutils.cpp
        run: |
          FILE="ASLI/libs/yaml/src/emitterutils.cpp"
          if [ -f "$FILE" ] && ! grep -q "cstdint" "$FILE"; then
            sed -i 's|#include "yaml-cpp/null.h"|#include "yaml-cpp/null.h"\n#include <cstdint>|' "$FILE"
            echo "Patched: $FILE"
          fi

      # -----------------------------------------------------------------
      # FIX v17 : remplacement EXACT des CMAKE_ARGS connus dans ASLI CMakeLists.txt
      # On a le texte exact depuis le source — remplacement chirurgical
      # -----------------------------------------------------------------
      - name: Fix CMAKE_ARGS syntax in ASLI CMakeLists.txt
        run: |
          python3 - << 'PYEOF'
          filepath = "ASLI/CMakeLists.txt"
          with open(filepath, "r") as f:
              content = f.read()

          # --- Fix 1: mmg3d CMAKE_ARGS (syntaxe exacte connue) ---
          OLD_MMG = '''    CMAKE_ARGS(-DCMAKE_BUILD_TYPE=Release -DBUILD=MMG3D -DLIBMMG3D_STATIC=ON
               -DLIBMMG3D_SHARED=OFF -DUSE_ELAS=OFF -DUSE_VTK=OFF -DCMAKE_INSTALL_PREFIX=<INSTALL_DIR>)'''

          NEW_MMG = '''    CMAKE_ARGS
               -DCMAKE_BUILD_TYPE=Release
               -DCMAKE_POLICY_VERSION_MINIMUM=3.5
               -DBUILD_MMG3D=ON
               -DLIBMMG3D_STATIC=ON
               -DLIBMMG3D_SHARED=OFF
               -DUSE_ELAS=OFF
               -DUSE_VTK=OFF
               -DCMAKE_INSTALL_PREFIX=<INSTALL_DIR>'''

          if OLD_MMG in content:
              content = content.replace(OLD_MMG, NEW_MMG)
              print("SUCCESS: mmg3d CMAKE_ARGS patched")
          else:
              print("WARNING: mmg3d exact string not found, trying fallback...")
              # Fallback: regex sur la structure CMAKE_ARGS(...)
              import re
              content, n = re.subn(
                  r'CMAKE_ARGS\((-DCMAKE_BUILD_TYPE=Release -DBUILD[^\)]+)\)',
                  lambda m: 'CMAKE_ARGS\n               -DCMAKE_POLICY_VERSION_MINIMUM=3.5\n               ' + m.group(1).replace(' -D', '\n               -D').replace('-DBUILD=MMG3D', '-DBUILD_MMG3D=ON'),
                  content
              )
              print(f"Fallback applied {n} replacements")

          # --- Fix 2: mshmet CMAKE_ARGS ---
          OLD_MSHMET = '''    CMAKE_ARGS(-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=<INSTALL_DIR>)'''
          NEW_MSHMET = '''    CMAKE_ARGS
               -DCMAKE_BUILD_TYPE=Release
               -DCMAKE_INSTALL_PREFIX=<INSTALL_DIR>'''

          if OLD_MSHMET in content:
              content = content.replace(OLD_MSHMET, NEW_MSHMET)
              print("SUCCESS: mshmet CMAKE_ARGS patched")

          # --- Fix 3: QASLI CMAKE_ARGS si présent ---
          OLD_QASLI = '''    CMAKE_ARGS(-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=<INSTALL_DIR>)'''
          # Déjà remplacé par Fix2 si identique

          with open(filepath, "w") as f:
              f.write(content)

          # Vérification finale
          print("\n=== mmg3d ExternalProject block (after patch) ===")
          lines = content.split('\n')
          in_mmg = False
          for i, line in enumerate(lines):
              if 'ExternalProject_Add' in line and 'MMG_PREFIX' in line and 'mmg3d' not in line.lower():
                  pass
              if 'ExternalProject_Add(${MMG_PREFIX}' in line or ('ExternalProject_Add' in line and 'mmg3d' in line.lower()):
                  in_mmg = True
              if in_mmg:
                  print(f"  {i+1}: {line}")
              if in_mmg and line.strip() == ')':
                  in_mmg = False
                  break
          PYEOF

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
