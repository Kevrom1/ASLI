# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v13 : FIX mmg3d — patch ExternalProject_Add dans CMakeLists.txt d'ASLI
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          P='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$P" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # Patch emitterutils.cpp — ajoute #include <cstdint>
      # -----------------------------------------------------------------
      - name: Patch emitterutils.cpp
        run: |
          FILE="ASLI/libs/yaml/src/emitterutils.cpp"
          if [ -f "$FILE" ] && ! grep -q "cstdint" "$FILE"; then
            sed -i '/#include "yaml-cpp\/null.h"/a #include <cstdint>' "$FILE"
            echo "Patched: $FILE"
          fi

      # -----------------------------------------------------------------
      # FIX v13 : patch le CMakeLists.txt principal d'ASLI pour injecter
      # CMAKE_POLICY_VERSION_MINIMUM dans le ExternalProject mmg3d
      # On cherche la ligne CMAKE_ARGS de mmg3d et on y ajoute le flag
      # -----------------------------------------------------------------
      - name: Patch ASLI CMakeLists.txt to fix mmg3d ExternalProject
        run: |
          FILE="ASLI/CMakeLists.txt"
          echo "=== Searching mmg references ==="
          grep -n "mmg\|ExternalProject\|CMAKE_ARGS" "$FILE" | head -40

          # Ajoute CMAKE_POLICY_VERSION_MINIMUM=3.5 aux CMAKE_ARGS de mmg3d
          # Le pattern cherche la ligne CMAKE_ARGS dans le bloc mmg3d
          sed -i '/ExternalProject_Add.*mmg3d/,/\)/{
            s/CMAKE_ARGS/CMAKE_ARGS -DCMAKE_POLICY_VERSION_MINIMUM=3.5/
          }' "$FILE"

          # Alternative : cherche directement la ligne avec les args cmake de mmg
          # et insère le flag après CMAKE_ARGS
          if ! grep -q "POLICY_VERSION_MINIMUM" "$FILE"; then
            sed -i 's/-DMMG_RELOCATABLE_INSTALL=ON/-DMMG_RELOCATABLE_INSTALL=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5/g' "$FILE"
            echo "Patched via RELOCATABLE flag line"
          fi

          echo "=== After patch ==="
          grep -n "POLICY_VERSION\|CMAKE_ARGS\|mmg" "$FILE" | head -20

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
