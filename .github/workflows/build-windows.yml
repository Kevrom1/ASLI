# =============================================================================
# GitHub Actions — Build ASLI + QASLI on Windows
# v10 : FIX direct du code source de emitterutils.cpp (recherche récursive)
# =============================================================================

name: Build ASLI + QASLI (Windows GUI)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows-gui:
    name: Compile ASLI.exe + QASLI.exe
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:

      - name: Checkout ASLI (ton fork)
        uses: actions/checkout@v4
        with:
          path: ASLI
          submodules: recursive

      - name: Checkout QASLI
        uses: actions/checkout@v4
        with:
          repository: tpms-lattice/QASLI
          path: QASLI

      - name: Setup MSYS2 with all dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            cmake
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-tbb
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-3d

      # -----------------------------------------------------------------
      # Affiche la structure de libs/ pour diagnostic
      # -----------------------------------------------------------------
      - name: Show libs structure
        run: find ASLI/libs -maxdepth 3 -type d | sort

      # -----------------------------------------------------------------
      # Patch AdaptTools (C legacy)
      # -----------------------------------------------------------------
      - name: Patch AdaptTools legacy C files
        run: |
          P='#pragma GCC diagnostic ignored "-Wimplicit-function-declaration"\n#pragma GCC diagnostic ignored "-Wint-conversion"\n#pragma GCC diagnostic ignored "-Wstringop-overflow"\n'
          for FILE in "ASLI/libs/AdaptTools/sources/mshmet/mshmet.c" "ASLI/libs/AdaptTools/sources/commonFiles/libmesh5.c"; do
            if [ -f "$FILE" ] && ! grep -q "Wimplicit-function-declaration" "$FILE"; then
              TMP=$(mktemp)
              printf '%b' "$P" > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Patched: $FILE"
            fi
          done

      # -----------------------------------------------------------------
      # FIX v10 : patch direct du source emitterutils.cpp
      # Ajoute #include <cstdint> manquant et corrige GetSurrogatePair
      # -----------------------------------------------------------------
      - name: Patch emitterutils.cpp (fix uint32_t + surrogatePair)
        run: |
          FILE=$(find ASLI/libs -name "emitterutils.cpp" 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "emitterutils.cpp not found — skipping"
          else
            echo "Found: $FILE"
            # Ajoute #include <cstdint> si manquant
            if ! grep -q "cstdint" "$FILE"; then
              TMP=$(mktemp)
              printf '#include <cstdint>\n' > "$TMP"
              cat "$FILE" >> "$TMP"
              mv "$TMP" "$FILE"
              echo "Added cstdint include"
            fi
            # Corrige GetSurrogatePair : retourne struct au lieu de int
            # La fonction doit retourner std::pair<uint32_t,uint32_t>
            # On utilise sed pour remplacer le type de retour
            sed -i 's/static int GetSurrogatePair/static std::pair<uint32_t,uint32_t> GetSurrogatePair/g' "$FILE"
            # Corrige l'appel .first et .second si surrogatePair est int
            sed -i 's/int surrogatePair = GetSurrogatePair/auto surrogatePair = GetSurrogatePair/g' "$FILE"
            echo "Patched GetSurrogatePair in $FILE"
          fi

      - name: Configure ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DMARCH_NATIVE=OFF \
                -DCMAKE_C_FLAGS="-w" \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build ASLI
        run: |
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          cd ASLI/build
          make -j$(nproc)

      - name: Verify ASLI.exe
        run: ls -lh ASLI/bin/ASLI.exe

      - name: Copy ASLI.exe into QASLI source directory
        run: cp ASLI/bin/ASLI.exe QASLI/

      - name: Configure QASLI
        run: |
          cd QASLI
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_FLAGS="-w" \
                ..

      - name: Build QASLI
        run: |
          cd QASLI/build
          make -j$(nproc)

      - name: Verify QASLI.exe
        run: ls -lh QASLI/build/QASLI.exe

      - name: Assemble final package
        run: |
          mkdir -p package/ASLI_QASLI
          cp ASLI/bin/ASLI.exe              package/ASLI_QASLI/
          cp QASLI/build/QASLI.exe          package/ASLI_QASLI/
          cp ASLI/config.yml                package/ASLI_QASLI/
          cp -r ASLI/inputs                 package/ASLI_QASLI/ 2>/dev/null || true

          QT_BIN="/mingw64/bin"
          for DLL in Qt5Core Qt5Gui Qt5Widgets Qt53DCore Qt53DRender Qt53DExtras; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done
          for DLL in libgcc_s_seh-1 libstdc++-6 libwinpthread-1; do
            cp "$QT_BIN/${DLL}.dll" package/ASLI_QASLI/ 2>/dev/null || true
          done

          echo "--- Package contents ---"
          ls -lh package/ASLI_QASLI/

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: ASLI-QASLI-windows-package
          path: package/ASLI_QASLI/
          retention-days: 30
